<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<style>
    ul {list-style-type: none}
    .card-header-pills {
        align-items: center;
    }
    .nav-link {
        color: white;
    }
</style>
<body>
    <header class="card">
        <h3>пасхалко</h3>
    </header>
    <header class="card card-header-pills fixed-top">
        <ul class="nav nav-pills align-items-md-center">
            <li class="nav-item">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" {% if request.path == '/' %}aria-current="page"{% endif %}>
                    На главную
                </a>
            </li>
            {% if current_user.is_authenticated %}
                <li class="nav-item">
                    <a href="/timetable" class="nav-link {% if request.path == '/timetable' %}active{% endif %}" {% if request.path == '/timetable' %}aria-current="page"{% endif %}>
                        Расписание
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/logout" class="nav-link btn btn-danger" {% if request.path == '/auth' %}aria-current="page"{% endif %}>
                        Выход
                    </a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a href="/login" class="nav-link {% if request.path == '/auth' %}active{% endif %}" {% if request.path == '/auth' %}aria-current="page"{% endif %}>
                        Вход
                    </a>
                </li>
            {% endif %}
        </ul>
    </header>
    {% block body %}
    {% endblock %}
    <!-- <div class="background">
        <img class="card-img" src="{{ url_for('static', filename='/res/img7.png') }}" alt="minecraft(main-link)">
        <img class="card-img" src="{{ url_for('static', filename='/res/img5.png') }}" alt="minecraft(main-link)">
    </div> -->
</body>
</html>
